<!DOCTYPE html>
<html {{HTML_LANG_ATTRS}}>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{PAGE_TITLE}}</title>
  <link rel="stylesheet" href="rendering_style_config.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
<div class="page-wrapper">

<aside class="sidebar" aria-label="Desktop Navigation">
    <div class="sidebar__logo"><span>🌐 TravelUI</span></div>
    <nav class="sidebar__nav">
        {{NAV_LINKS}} </nav>
</aside>

<nav class="mobile-nav" aria-label="Mobile Navigation">
  <div class="mobile-nav__scroll">
    {{NAV_PILLS}} </div>
</nav>

<main id="main-content" class="main-content">
    {{TRIP_CONTENT}} </main>

</div>
<script>
(function () {
  var links = Array.prototype.slice.call(
    document.querySelectorAll('.sidebar__link[href^="#"], .mobile-nav__pill[href^="#"]')
  );
  if (!links.length || !('IntersectionObserver' in window)) return;

  var ids = [];
  document.querySelectorAll('.sidebar__link[href^="#"]').forEach(function (l) {
    ids.push(l.getAttribute('href').slice(1));
  });
  var sections = ids.map(function (id) { return document.getElementById(id); }).filter(Boolean);
  if (!sections.length) return;

  function setActive(id) {
    document.querySelectorAll('.sidebar__link, .mobile-nav__pill').forEach(function (el) {
      var match = el.getAttribute('href') === '#' + id;
      el.classList.toggle('is-active', match);
      if (match) { el.setAttribute('aria-current', 'page'); }
      else { el.removeAttribute('aria-current'); }
    });
    var activePill = document.querySelector('.mobile-nav__pill.is-active');
    if (activePill) { activePill.scrollIntoView({ inline: 'center', block: 'nearest', behavior: 'smooth' }); }
  }

  var observer = new IntersectionObserver(function (entries) {
    entries.forEach(function (entry) {
      if (entry.isIntersecting) { setActive(entry.target.id); }
    });
  }, { rootMargin: '-15% 0px -75% 0px', threshold: 0 });

  sections.forEach(function (s) { observer.observe(s); });
}());
</script>
</body>
</html>
